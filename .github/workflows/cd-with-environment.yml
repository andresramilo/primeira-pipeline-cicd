name: Deploy No Kubernetes With Environment
on:
  workflow_call:
    inputs:
      manifests:
        required: true
        type: string
        description: "Arquivo de manifesto para deploy"
      images:
        required: true
        type: string
        description: "Imagens que serão alteradas nos manifestos"
      environment:
        required: true
        type: string
        description: "Nome do ambiente que vai ser utilizado"
jobs:
  deploy-k8s:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Obtendo o código
        uses: actions/checkout@v4.1.5
      - name: Instalação do doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Configuração de contexto do Kubernetes
        uses: azure/k8s-set-context@v4.0.0
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.K8S_CONFIG }}
      - name: Execução do Manifesto
        uses: Azure/k8s-deploy@v5
        with:
          manifests: ${{ inputs.manifests }}
          images: ${{ inputs.images }}
          namespace: ${{ vars.APP_NAMESPACE }}
